<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apostas - Oscar 2026</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div style="max-width: 500px; width: 90%; margin: auto; padding-top: 20px;">
        <div class="form-header">
            <h1>Sua Cédula</h1>
            <p>Vote nos melhores do ano no cinema.</p>
        </div>
        <form id="form-aposta">
            <input type="text" id="nome" class="dark-input" required placeholder="Digite seu nome">
            <div id="categorias-container"></div>
            
            <h2 class="category-title"><i class="fas fa-bullseye"></i> Certeza Absoluta</h2>
            <p style="color: var(--text-muted); font-size: 14px; margin-bottom: 15px;">Escolha a categoria onde você quer dobrar seus pontos (Se errar, você perde os pontos base!).</p>
            <select id="certeza_absoluta" class="dark-input" required>
                <option value="">Selecione a categoria All-In...</option>
            </select>
            <button type="submit" class="btn-lock">Confirmar Minhas Escolhas</button>
        </form>
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item"><i class="fas fa-chart-simple"></i><span>Ranking</span></a>
        <a href="apostar.html" class="nav-item active"><i class="fas fa-clipboard-check"></i><span>Palpites</span></a>
        <a href="admin.html" class="nav-item"><i class="fas fa-crown"></i><span>Admin</span></a>
    </nav>
    <script type="module" src="apostar.js"></script>
</body>
</html>
